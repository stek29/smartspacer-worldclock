name: Android APK

on:
  push:
    branches:
      - master
    tags:
      - "**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: android-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  debug:
    name: Debug APK
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Install Android SDK 37
        run: sdkmanager "platforms;android-37.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Run unit tests
        run: ./gradlew --no-daemon :app:testDebugUnitTest

      - name: Run debug lint
        run: ./gradlew --no-daemon :app:lintDebug

      - name: Build debug APK
        run: ./gradlew --no-daemon :app:assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v7
        with:
          name: smartspacer-worldclock-debug-${{ github.sha }}
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

  release:
    name: Release APK
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Install Android SDK 37
        run: sdkmanager "platforms;android-37.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Validate release signing secrets
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          : "${ANDROID_KEYSTORE_BASE64:?ANDROID_KEYSTORE_BASE64 secret is required}"
          : "${ANDROID_KEYSTORE_PASSWORD:?ANDROID_KEYSTORE_PASSWORD secret is required}"
          : "${ANDROID_KEY_ALIAS:?ANDROID_KEY_ALIAS secret is required}"
          : "${ANDROID_KEY_PASSWORD:?ANDROID_KEY_PASSWORD secret is required}"

      - name: Decode release keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          mkdir -p "$RUNNER_TEMP/signing"
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/signing/release.jks"

      - name: Run unit tests
        run: ./gradlew --no-daemon :app:testDebugUnitTest

      - name: Run release lint
        run: ./gradlew --no-daemon :app:lintRelease

      - name: Build release APK
        env:
          ANDROID_KEYSTORE_FILE: ${{ runner.temp }}/signing/release.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew --no-daemon :app:assembleRelease

      - name: Prepare release assets
        run: |
          mkdir -p "$RUNNER_TEMP/release-assets"
          cp app/build/outputs/apk/release/*.apk "$RUNNER_TEMP/release-assets/"
          cd "$RUNNER_TEMP/release-assets"
          sha256sum *.apk > SHA256SUMS.txt

      - name: Attach APK to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            ${{ runner.temp }}/release-assets/*.apk
            ${{ runner.temp }}/release-assets/SHA256SUMS.txt
          fail_on_unmatched_files: true
